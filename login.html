<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper 會議助手 - 登入</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .auth-container h2 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .toggle-link {
            margin-top: 15px;
            font-size: 0.9em;
            color: #007bff;
            cursor: pointer;
            display: inline-block;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 15px;
            font-size: 0.9em;
            color: red;
        }
        .success {
            color: green;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="auth-container" id="login-box">
    <h2>🎙️ 會員登入</h2>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="輸入您的信箱">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="輸入密碼">
    </div>
    <button onclick="login()">登入</button>
    <div id="login-message" class="message"></div>
    <span class="toggle-link" onclick="toggleView('register')">還沒有帳號？點此註冊</span><br>
    <span class="toggle-link" style="color:#888; margin-top:5px;" onclick="alert('忘記密碼功能即將推出！')">忘記密碼？</span>
</div>

<div class="auth-container hidden" id="register-box">
    <h2>📝 註冊新帳號</h2>
    <div class="form-group">
        <label>使用者名稱</label>
        <input type="text" id="reg-username" placeholder="怎麼稱呼您？">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="輸入您的信箱">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="reg-password" placeholder="設定密碼 (最少6碼)">
    </div>
    <button onclick="register()" style="background-color: #28a745;">註冊</button>
    <div id="register-message" class="message"></div>
    <span class="toggle-link" onclick="toggleView('login')">已有帳號？返回登入</span>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:8000";

    function toggleView(view) {
        document.getElementById('login-message').innerText = "";
        document.getElementById('register-message').innerText = "";
        if (view === 'register') {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('register-box').classList.remove('hidden');
        } else {
            document.getElementById('register-box').classList.add('hidden');
            document.getElementById('login-box').classList.remove('hidden');
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const msgBox = document.getElementById('register-message');

        if (!username || !email || !password) {
            msgBox.className = "message";
            msgBox.innerText = "請填寫所有欄位！";
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            
            const data = await response.json();

            if (response.ok) {
                msgBox.className = "message success";
                msgBox.innerText = "註冊成功！請返回登入。";
                document.getElementById('reg-username').value = "";
                document.getElementById('reg-email').value = "";
                document.getElementById('reg-password').value = "";
                setTimeout(() => toggleView('login'), 1500); 
            } else {
                msgBox.className = "message";
                msgBox.innerText = data.detail || "註冊失敗，請稍後再試。";
            }
        } catch (error) {
            msgBox.className = "message";
            msgBox.innerText = "無法連線到伺服器！";
        }
    }

    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const msgBox = document.getElementById('login-message');

        if (!email || !password) {
            msgBox.className = "message";
            msgBox.innerText = "請輸入 Email 與密碼！";
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                msgBox.className = "message success";
                msgBox.innerText = "登入成功！準備進入會員專區...";
                
                localStorage.setItem("whisper_user", JSON.stringify(data.user));
                
                // 🚀 【修改點】跳轉到 dashboard.html (會員專區)
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            } else {
                msgBox.className = "message";
                msgBox.innerText = data.detail || "登入失敗，請檢查帳號密碼。";
            }
        } catch (error) {
            msgBox.className = "message";
            msgBox.innerText = "無法連線到伺服器！";
        }
    }
</script>

</body>
</html>
